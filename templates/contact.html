{% include "header.html" %}

<!-- Page Header-->
<header class="masthead" id="contactMasthead">
  <picture>
    <source media="(max-width: 767px)" srcset="{{ url_for('static', filename='assets/img/m-contact-bg.webp') }}">
    <source media="(min-width: 768px)" srcset="{{ url_for('static', filename='assets/img/contact-bg.webp') }}">
    <img src="{{ url_for('static', filename='assets/img/contact-bg.webp') }}" alt="Contact page hero background">
  </picture>
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Main Content-->
<main class="contact-main">
  <div class="contact-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10 col-12">
          <!-- Contact Form Card -->
          <div class="contact-card">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
              <i class="fas fa-check-circle me-2"></i>{{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- Form Header -->
            <div class="contact-form-header">
              <div class="form-header-icon">
                <i class="fas fa-envelope"></i>
              </div>
              <h2 class="contact-form-title">Send us a Message</h2>
              <p class="contact-form-subtitle">We'd love to hear from you. Get in touch with our team.</p>
            </div>

            <!-- Contact Form -->
            <form method="POST" novalidate class="contact-form" id="contactForm" action="{{ url_for('contact') }}">
              
              <!-- Name & Email in Two Columns -->
              <div class="form-row-contact">
                <!-- Name Field -->
                <div class="form-group-contact">
                  <label for="name" class="form-label-contact">
                    <span class="label-text">Full Name</span>
                    <span class="required-star">*</span>
                  </label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-input-contact"
                    placeholder="Your full name"
                    required
                  />
                </div>

                <!-- Email Field -->
                <div class="form-group-contact">
                  <label for="email" class="form-label-contact">
                    <span class="label-text">Email Address</span>
                    <span class="required-star">*</span>
                  </label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input-contact"
                    placeholder="your.email@example.com"
                    required
                  />
                </div>
              </div>

              <!-- Phone Field -->
              <div class="form-group-contact full-width">
                <label for="phone" class="form-label-contact">
                  <span class="label-text">Phone Number</span>
                  <span class="required-star">*</span>
                </label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  class="form-input-contact"
                  placeholder="+92 300 1234567"
                  required
                />
              </div>

              <!-- Message Field -->
              <div class="form-group-contact full-width">
                <label for="message" class="form-label-contact">
                  <span class="label-text">Message</span>
                  <span class="required-star">*</span>
                </label>
                <textarea
                  id="message"
                  name="message"
                  class="form-textarea-contact"
                  placeholder="Tell us what's on your mind..."
                  rows="6"
                  required
                ></textarea>
              </div>

              <!-- Submit Button -->
              <div class="form-submit-contact">
                <button type="submit" class="btn-submit-contact" id="submitButton">
                  <span>Send Message</span>
                  <i class="fas fa-paper-plane"></i>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

{% include "footer.html" %}
